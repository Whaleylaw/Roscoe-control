slug: firmvault-demand-send-package
name: FirmVault Demand - Send Package
description: Uses same-task human confirmation to document that an approved demand package was sent.
when_to_use: Use after demand recipients are identified and a human-send handoff has been prepared.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 3
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - demand
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
