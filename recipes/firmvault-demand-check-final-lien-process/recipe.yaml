slug: firmvault-demand-check-final-lien-process
name: FirmVault Demand - Check Final Lien Process
description: Checks whether final-lien work has started before demand drafting and creates the internal handoff if needed.
when_to_use: Use immediately before drafting demand so unresolved final-lien work can begin in parallel without putting lien details into the demand letter.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - demand
  - liens
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2

