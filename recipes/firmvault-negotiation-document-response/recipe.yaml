slug: firmvault-negotiation-document-response
name: FirmVault Negotiation - Document Response
description: Records the human-confirmed external negotiation response and marks settlement reached only after accepted-offer send evidence exists.
when_to_use: Use after a human sends the accepted/counter/rejection response to the carrier.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - negotiation
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
