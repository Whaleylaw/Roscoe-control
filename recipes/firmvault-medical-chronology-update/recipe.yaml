slug: firmvault-medical-chronology-update
name: FirmVault Medical Chronology - Update
description: Updates a provider or case medical chronology from received records shadows.
when_to_use: Use after provider records are received or corrected and the chronology needs to be created or updated.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-chronology
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
