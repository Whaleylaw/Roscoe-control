slug: firmvault-lien-resolution-review-inventory
name: FirmVault Lien Resolution - Review Inventory
description: Reviews canonical lien inventory and identifies open liens needing final amount work.
when_to_use: Use when a lien has been identified and final lien resolution work may be needed.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets: [OPENROUTER_API_KEY]
tools: [read_file, list_dir, grep_files, write_file]
tags: [law-firm, firmvault, liens]
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
