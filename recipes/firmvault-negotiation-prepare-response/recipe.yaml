slug: firmvault-negotiation-prepare-response
name: FirmVault Negotiation - Prepare Response
description: Prepares the human-send handoff for accepting, countering, or rejecting a documented settlement offer.
when_to_use: Use after the attorney/client decision is documented and before any external negotiation response is sent.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - negotiation
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
