slug: firmvault-negotiation-document-client-decision
name: FirmVault Negotiation - Document Client Decision
description: Records the human-confirmed client response to an evaluated settlement offer.
when_to_use: Use after attorney-approved offer evaluation has been communicated to the client through a human review gate.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - negotiation
  - client-decision
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
