slug: firmvault-insurance-bi-prepare-lor
name: FirmVault Insurance BI - Prepare LOR Handoff
description: Prepares a BI letter-of-representation draft or exact human handoff without sending it externally.
when_to_use: Use after the at-fault BI carrier is identified and a representation letter or claim-opening handoff is needed.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - insurance
  - bi
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
