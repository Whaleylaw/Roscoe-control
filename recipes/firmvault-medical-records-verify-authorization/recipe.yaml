slug: firmvault-medical-records-verify-authorization
name: FirmVault Medical Records Verify Authorization
description: Verifies that a FirmVault case has a signed HIPAA or medical authorization before records and bills are requested.
when_to_use: Use as the first node in the FirmVault request medical records and bills workflow.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 2700
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - write_file
  - run_shell
tags:
  - law-firm
  - firmvault
  - medical-records
  - authorization
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
