slug: firmvault-client-check-in-prepare-handoff
name: FirmVault Client Check-In - Prepare Handoff
description: Prepares a human-facing client check-in script and task handoff without sending it.
when_to_use: Use when a client check-in is due and a human needs a concise script/questions list.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - client-check-in
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
