slug: firmvault-request-records-bills-follow-up
name: FirmVault Request Records and Bills - Follow Up
description: Reviews pending records/bills requests after a timer and prepares or documents the follow-up.
when_to_use: Use when a provider records/bills request timer expires and the requested documents have not arrived.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-records
  - follow-up
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
