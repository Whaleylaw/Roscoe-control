slug: firmvault-insurance-bi-send-lor
name: FirmVault Insurance BI - Send LOR
description: Prepares or documents the letter-of-representation handoff for a bodily-injury carrier.
when_to_use: Use after at-fault insurance is identified and the BI claim needs to be opened or documented.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - insurance
  - bi
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
