slug: firmvault-negotiation-offer-evaluation
name: FirmVault Negotiation - Offer Evaluation
description: Prepares an attorney-facing offer evaluation and net-to-client analysis from canonical FirmVault evidence.
when_to_use: Use after an offer has been documented and before attorney/client decision-making.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - negotiation
  - offer-evaluation
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
