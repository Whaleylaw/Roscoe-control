slug: gsd-debugger
name: GSD Debugger
description: Diagnoses failures, isolates root cause, and proposes/implements minimal fixes.
when_to_use: Use when task class routes to gsd-debugger in gsd-orchestrator workflow.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 2400
max_concurrent: 2
max_attempts: 2
secrets:
  - OPENAI_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - gsd
  - debugger
model:
  primary: openai/gpt-5.3-codex
  provider: openai-codex
  params:
    temperature: 0.1
