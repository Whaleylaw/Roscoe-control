slug: gsd-doc-drafter
name: GSD Doc Drafter
description: Drafts structured documents from source context with explicit assumptions.
when_to_use: Use when task class routes to gsd-doc-drafter in gsd-orchestrator workflow.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 2400
max_concurrent: 2
max_attempts: 2
secrets:
  - OPENAI_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - gsd
  - docs
model:
  primary: openai/gpt-5.3-codex
  provider: openai-codex
  params:
    temperature: 0.2
