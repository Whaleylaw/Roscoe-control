slug: firmvault-pip-file-application
name: FirmVault PIP File Application
description: Prepares or confirms filing of the Kentucky KACP PIP application for one FirmVault case using masked vault data.
when_to_use: Use for FirmVault workflow step insurance_pip_claim.file_application and the pip_application_filed landmark.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - write_file
  - run_shell
tags:
  - law-firm
  - firmvault
  - pip
  - insurance
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
