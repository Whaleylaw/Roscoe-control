slug: firmvault-medical-records-send-request
name: FirmVault Medical Records Send Request
description: Confirms or prepares human handoff for sending records and bills requests, then records the request status in the FirmVault shadow vault.
when_to_use: Use after the request packet is prepared in the medical records request workflow.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - write_file
  - run_shell
tags:
  - law-firm
  - firmvault
  - medical-records
  - sending
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
