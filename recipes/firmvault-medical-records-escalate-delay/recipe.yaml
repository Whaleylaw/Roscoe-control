slug: firmvault-medical-records-escalate-delay
name: FirmVault Medical Records Escalate Delay
description: Prepares escalation for records and bills still missing 30 days after the original request.
when_to_use: Use after first and second follow-ups when medical records or bills remain outstanding at 30 days.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 2700
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-records
  - escalation
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
