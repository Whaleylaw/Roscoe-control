slug: firmvault-insurance-pip-open-claim
name: FirmVault Insurance PIP - Open Claim
description: Identifies the PIP carrier path and prepares or documents opening a Kentucky PIP claim.
when_to_use: Use after intake or accident-report facts indicate a possible PIP coverage path.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - pip
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
