slug: firmvault-demand-identify-recipients
name: FirmVault Demand - Identify Recipients
description: Identifies demand recipients from canonical claim ledgers and prepares a human-send demand handoff.
when_to_use: Use after the demand PR has been attorney-approved/merged and before any demand package leaves the firm.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - demand
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
