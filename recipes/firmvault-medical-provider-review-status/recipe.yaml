slug: firmvault-medical-provider-review-status
name: FirmVault Medical Provider Status - Review
description: Reviews and normalizes provider treatment status without requesting records or bills.
when_to_use: Use after provider setup, client check-ins, treatment updates, or manual treatment-status review.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-provider
  - treatment-monitoring
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
