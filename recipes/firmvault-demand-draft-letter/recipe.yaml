slug: firmvault-demand-draft-letter
name: FirmVault Demand - Draft Letter
description: Drafts the demand letter and demand package from canonical FirmVault materials without including lien information.
when_to_use: Use after demand readiness is reviewed and the internal final-lien process check has run.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - demand
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2

