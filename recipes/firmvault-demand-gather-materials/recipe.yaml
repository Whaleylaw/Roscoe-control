slug: firmvault-demand-gather-materials
name: FirmVault Demand - Gather Materials
description: Gathers demand-ready medical, insurance, damages, and internal lien-process materials into demand/readiness.md.
when_to_use: Use after treatment, provider records, itemized bills, and medical chronologies are complete enough to evaluate demand readiness.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - demand
  - damages
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
