slug: firmvault-workflow-task
name: FirmVault Workflow Task
description: Executes one FirmVault v2 case workflow landmark inside Mission Control using the task metadata, PHASE_DAG.yaml, DATA_CONTRACT.md, and mounted FirmVault shadow vault.
when_to_use: Use for law-firm case tasks materialized from FirmVault v2 phases, tracks, landmarks, and task templates.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - write_file
  - run_shell
tags:
  - law-firm
  - firmvault
  - workflow
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
