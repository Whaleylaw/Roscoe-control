slug: firmvault-workflow-task
name: FirmVault Workflow Task
description: Executes one FirmVault native case workflow task inside Mission Control using task metadata, DATA_CONTRACT.md, PHASE_DAG.yaml, and the mounted FirmVault shadow vault.
when_to_use: Use for law-firm case tasks materialized from FirmVault workflows, phases, landmarks, and task templates.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - workflow
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
