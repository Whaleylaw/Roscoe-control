slug: firmvault-pip-track-exhaustion
name: FirmVault PIP Track Exhaustion
description: Tracks whether PIP benefits are exhausted and records the supported status in the FirmVault masked claim shadow.
when_to_use: Use for FirmVault workflow step insurance_pip_claim.track_exhaustion and the pip_benefits_exhausted landmark.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - pip
  - insurance
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
