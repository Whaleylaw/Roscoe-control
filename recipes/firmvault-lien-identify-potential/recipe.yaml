slug: firmvault-lien-identify-potential
name: FirmVault Early Lien Identification
description: Identifies evidence-backed lien and payor clues without starting final lien resolution.
when_to_use: Use after provider setup, when payor clues appear, when lien notices arrive, or during treatment monitoring.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - lien
  - treatment-monitoring
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
