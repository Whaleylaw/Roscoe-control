slug: firmvault-accident-report-analyze
name: FirmVault Accident Report - Analyze
description: Analyzes a crash or accident report shadow and updates accident, party, witness, and insurance ledgers.
when_to_use: Use after an accident or police report shadow is available in the FirmVault case.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - accident-report
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
