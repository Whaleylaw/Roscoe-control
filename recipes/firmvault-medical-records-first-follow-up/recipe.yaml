slug: firmvault-medical-records-first-follow-up
name: FirmVault Medical Records First Follow-Up
description: Performs the 14-day follow-up review for pending medical records and bills requests.
when_to_use: Use 14 days after a medical records and bills request if records or bills have not been received.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 2700
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-records
  - follow-up
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
