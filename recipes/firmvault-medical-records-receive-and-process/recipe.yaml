slug: firmvault-medical-records-receive-and-process
name: FirmVault Medical Records Receive and Process
description: Confirms received medical records or bills are present in the FirmVault vault shadow and updates provider receipt tracking.
when_to_use: Use when records or bills arrive for a provider during the FirmVault request medical records and bills workflow.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - medical-records
  - receipt
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
