slug: firmvault-document-collection-review-intake
name: FirmVault Document Collection - Review Intake
description: Reviews onboarding documents and identifies missing intake, contract, and authorization items.
when_to_use: Use after a case shell exists or when intake documents arrive for onboarding review.
image: mc-recipe-agent:latest
workspace_mode: worktree
timeout_seconds: 3600
max_concurrent: 1
max_attempts: 2
secrets:
  - OPENROUTER_API_KEY
tools:
  - read_file
  - list_dir
  - grep_files
  - write_file
tags:
  - law-firm
  - firmvault
  - onboarding
model:
  primary: openai/gpt-5.4-mini
  provider: openrouter
  params:
    temperature: 0.2
